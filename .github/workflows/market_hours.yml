name: Alpha-Detector (Market Hours)

on:
  schedule:
    # 決算発表時間帯 15:00〜16:05 JST (UTC 06:00〜07:05) を5分間隔で実行
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 6 * * 1-5'
    - cron: '0,5 7 * * 1-5'
  workflow_dispatch:  # 手動実行ボタン

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 処理済み開示IDを前回実行から引き継ぐ（重複処理防止）
      - name: Restore processed IDs cache
        uses: actions/cache@v4
        with:
          path: data/processed_ids.json
          key: processed-ids-${{ github.run_id }}
          restore-keys: |
            processed-ids-

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Alpha-Detector
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GOOGLE_SHEETS_CREDS: ${{ secrets.GOOGLE_SHEETS_CREDS }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          # J-Quants APIキーは不要（TDnetスクレイピング方式）
        run: |
          cd src
          python main.py

      # 処理済みIDを次回実行のために保存
      - name: Save processed IDs cache
        uses: actions/cache@v4
        with:
          path: data/processed_ids.json
          key: processed-ids-${{ github.run_id }}
